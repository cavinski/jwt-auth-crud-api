<h1>Register</h1>

<div>
    <input placeholder="Name" [(ngModel)]="name">
</div>

<div>
    <input placeholder="Email" [(ngModel)]="email">
</div>

<div>
    <input type="password" placeholder="Password" [(ngModel)]="password">
</div>

<button (click)="register()">
    Register
</button>

<a routerLink="/login">
    Login
</a>
