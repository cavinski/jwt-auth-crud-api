<h1>Login</h1>

<div>
    <input placeholder="Email" [(ngModel)]="email">
</div>

<div>
    <input type="password" placeholder="Password" [(ngModel)]="password">
</div>

<div *ngIf="errorMessage">
    {{ errorMessage }}
</div>

<button (click)="login()">
    Login
</button>

<a routerLink="/register">
    Register
</a>
