services:

  postgres:
    image: postgres:15
    container_name: postgres_api
    environment:
      POSTGRES_DB: api_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./jwt-auth-crud-api
    ports: 
      - "8080:8080"
    depends_on: 
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/api_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

  frontend:
    build: ./auth-crud-front
    ports: 
      - "4200:4200"
    depends_on: 
      - backend


volumes:

  postgres_data: